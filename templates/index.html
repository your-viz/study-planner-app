<!DOCTYPE html>
<html>
<head>

<title>Study Planner</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>📚 Study Planner</h1>

<form action="/add" method="post">

<input type="text" name="task" placeholder="Enter a study task..." required>

<button type="submit">Add Task</button>

</form>

<h2>Your Tasks</h2>

<ul>

{% for task in tasks %}

<li>{{task}}</li>

{% endfor %}

</ul>

</div>

</body>
</html>
